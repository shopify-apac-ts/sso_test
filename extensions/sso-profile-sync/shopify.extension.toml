api_version = "2026-01"

[[extensions]]
name = "SSO Profile Sync"
handle = "sso-profile-sync"
uid = "51dde3f5-20f1-d66b-d8ad-5343677164ef7ee4369b"
type = "ui_extension"

[[extensions.targeting]]
target = "customer-account.profile.block.render"
module = "./src/Extension.tsx"

[extensions.capabilities]
api_access = true

[extensions.settings]
  [[extensions.settings.fields]]
  key = "sync_enabled"
  type = "boolean"
  name = "Enable SSO Profile Sync"
  description = "When enabled, customer profile data (name and address) is automatically synced from the SSO server on each profile page visit."
